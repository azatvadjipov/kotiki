<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Азат & Фариза: Стамбул 🇹🇷</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sky: linear-gradient(to bottom, #7ddcfd 0%, #b2e9ff 70%, #52b73a 70%, #52b73a 75%, #9c6b30 75%);
            --ui-bg: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
            overflow: hidden;
            image-rendering: pixelated;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* Панель таймера сверху */
        .timer-panel {
            background-color: #fff;
            border: 4px solid var(--ui-bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            margin-bottom: 15px;
        }

        .timer-panel h1 {
            font-size: 0.65rem;
            color: var(--ui-bg);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .countdown {
            font-size: 0.85rem;
            color: #e74c3c;
        }

        /* Игровой экран */
        .screen {
            width: 100%;
            height: 280px;
            background: var(--sky);
            border: 4px solid var(--ui-bg);
            border-radius: 16px;
            position: relative;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Пиксельное Солнце */
        .pixel-sun {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 30px;
            height: 30px;
            background: #f1c40f;
            box-shadow: 0 0 0 4px #f39c12;
        }

        /* Активные Пиксельные Облака */
        .pixel-cloud {
            position: absolute;
            background: #fff;
            height: 12px;
            border-radius: 2px;
            opacity: 0.85;
        }
        .cloud-1 { 
            width: 60px; 
            top: 25px; 
            left: 10%;
            animation: cruiseSlow 12s ease-in-out infinite alternate;
        }
        .cloud-2 { 
            width: 90px; 
            top: 50px; 
            right: 15%; 
            animation: cruiseFast 8s ease-in-out infinite alternate;
        }

        @keyframes cruiseSlow {
            0% { transform: translateX(0); }
            100% { transform: translateX(60px); }
        }
        @keyframes cruiseFast {
            0% { transform: translateX(0); }
            100% { transform: translateX(-80px); }
        }

        /* Силуэт Стамбула на фоне Азата */
        .istanbul-bg {
            position: absolute;
            bottom: 70px;
            left: 10px;
            width: 140px;
            height: 50px;
            opacity: 0.25;
            pointer-events: none;
        }

        /* Табличка Истанбул */
        .city-sign {
            position: absolute;
            left: 15px;
            bottom: 80px;
            background: #fff;
            border: 3px solid var(--ui-bg);
            padding: 4px 6px;
            font-size: 0.45rem;
            color: #000;
            border-radius: 4px;
            text-align: center;
        }

        /* Контейнеры котиков */
        .cat-container {
            position: absolute;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Азат ВСЕГДА жестко слева */
        #azat-wrapper {
            left: 10%;
        }

        /* Фариза идет справа налево (управляется через JS) */
        #fariza-wrapper {
            left: 80%; 
        }

        .name-tag {
            font-size: 0.5rem;
            color: #fff;
            background-color: var(--ui-bg);
            padding: 4px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
            white-space: nowrap;
        }

        /* Оригинальные котики СВГ */
        .cat-sprite {
            width: 55px;
            height: 55px;
        }

        /* Разворот Фаризы влево навстречу Азату */
        #fariza-wrapper .cat-sprite {
            transform: scaleX(-1);
        }

        /* Большой розовый чемодан */
        .big-suitcase {
            width: 24px;
            height: 24px;
            position: absolute;
            bottom: 0;
            right: -18px;
        }

        /* Анимация покачивания при движении */
        .bounce-animation {
            animation: moveBounce 0.6s steps(2) infinite;
        }
        @keyframes moveBounce {
            50% { transform: translateY(-3px); }
        }

        /* СТИКЕРНЫЕ СЕРДЕЧКИ (Исправленные, плавные) */
        .tap-heart {
            position: absolute;
            width: 16px;
            height: 16px;
            animation: popHeart 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
            z-index: 99;
        }

        @keyframes popHeart {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            15% { transform: scale(1.3) translateY(-10px); opacity: 1; }
            80% { transform: scale(1.0) translateY(-40px); opacity: 1; }
            100% { transform: scale(0.7) translateY(-55px); opacity: 0; }
        }

        /* Салют при встрече */
        .victory-box {
            display: none;
            background-color: #fff;
            border: 4px solid #ff4757;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
        }
        .victory-box h2 { font-size: 0.9rem; color: #ff4757; margin-bottom: 10px; }
        .victory-box p { font-size: 0.6rem; color: var(--ui-bg); line-height: 1.5; }

        /* Мобильная адаптация размеров */
        @media (max-width: 450px) {
            .timer-panel h1 { font-size: 0.55rem; }
            .countdown { font-size: 0.75rem; }
            .screen { height: 240px; }
            .cat-sprite { width: 48px; height: 48px; }
            .big-suitcase { width: 20px; height: 20px; right: -14px; }
            #azat-wrapper { left: 8%; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="timer-panel" id="timer-screen">
            <h1>АЗАТ ЖДЕТ В СТАМБУЛЕ, ФАРИЗА ЛЕТИТ К НЕМУ... 🇹🇷✈️</h1>
            <div class="countdown" id="timer-text">00д : 00ч : 00м : 00с</div>
        </div>

        <div class="screen" id="click-zone">
            <div class="pixel-sun"></div>
            <div class="pixel-cloud cloud-1"></div>
            <div class="pixel-cloud cloud-2"></div>

            <svg class="istanbul-bg" viewBox="0 0 100 50" fill="#34495e" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="20" width="30" height="30"/>
                <circle cx="25" cy="20" r="15"/>
                <rect x="5" y="0" width="3" height="50"/>
                <rect x="42" y="0" width="3" height="50"/>
            </svg>

            <div class="city-sign">İSTANBUL</div>

            <div id="azat-wrapper" class="cat-container bounce-animation">
                <div class="name-tag">Азат 🇹🇷</div>
                <svg class="cat-sprite" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 16h4v2H2zM4 12h2v4H4zm2-4h2v4H6z" fill="#7f8c8d"/>
                    <rect x="8" y="14" width="14" height="12" fill="#95a5a6"/>
                    <rect x="10" y="16" width="10" height="10" fill="#7f8c8d"/>
                    <rect x="10" y="26" width="3" height="3" fill="#636e72"/>
                    <rect x="17" y="26" width="3" height="3" fill="#636e72"/>
                    <rect x="16" y="6" width="12" height="11" fill="#95a5a6"/>
                    <rect x="17" y="7" width="10" height="9" fill="#7f8c8d"/>
                    <rect x="17" y="3" width="3" height="3" fill="#7f8c8d"/>
                    <rect x="24" y="3" width="3" height="3" fill="#7f8c8d"/>
                    <rect x="23" y="8" width="3" height="4" fill="#2d3436"/>
                    <rect x="23" y="8" width="1" height="2" fill="#ffffff"/>
                    <rect x="27" y="11" width="2" height="1" fill="#ff7675"/>
                    <rect x="21" y="11" width="2" height="2" fill="#fab1a0" opacity="0.8"/>
                </svg>
            </div>

            <div id="fariza-wrapper" class="cat-container bounce-animation">
                <div class="name-tag">Фариза ✈️</div>
                <div style="position: relative;">
                    <svg class="cat-sprite" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 16h4v2H2zM4 12h2v4H4zm2-4h2v4H6z" fill="#dcdde1"/>
                        <rect x="8" y="14" width="14" height="12" fill="#ffffff"/>
                        <rect x="10" y="16" width="10" height="10" fill="#f5f6fa"/>
                        <rect x="10" y="26" width="3" height="3" fill="#b2bec3"/>
                        <rect x="17" y="26" width="3" height="3" fill="#b2bec3"/>
                        <rect x="16" y="6" width="12" height="11" fill="#ffffff"/>
                        <rect x="17" y="7" width="10" height="9" fill="#f5f6fa"/>
                        <rect x="17" y="3" width="3" height="3" fill="#ffffff"/>
                        <rect x="24" y="3" width="3" height="3" fill="#ffffff"/>
                        <rect x="18" y="5" width="1" height="1" fill="#ff7675"/>
                        <rect x="23" y="8" width="3" height="4" fill="#222f3e"/>
                        <rect x="23" y="8" width="1" height="2" fill="#ffffff"/>
                        <rect x="27" y="11" width="2" height="1" fill="#ff7675"/>
                        <rect x="21" y="11" width="2" height="2" fill="#ffb8b8"/>
                    </svg>
                    
                    <svg class="big-suitcase" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="4" width="12" height="11" fill="#ff7675" rx="1"/>
                        <rect x="3" y="5" width="10" height="9" fill="#ff4757" rx="1"/>
                        <rect x="5" y="0" width="6" height="4" fill="#2c3e50"/>
                        <rect x="6" y="1" width="4" height="3" fill="#fff"/>
                        <circle cx="5" cy="15" r="1" fill="#000"/>
                        <circle cx="11" cy="15" r="1" fill="#000"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="victory-box" id="victory-screen">
            <h2>💖 УРА! ОНИ ВСТРЕТИЛИСЬ! 💖</h2>
            <p>Азат и Фариза наконец-то вместе в Стамбуле!<br>Добро пожаловать в Турцию! 🇹🇷🐾✨</p>
        </div>
    </div>

    <template id="heart-element">
        <svg class="tap-heart" viewBox="0 0 11 11" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 1h2v2H3V1zm4 0h2v2H7V1zM1 3h9v4H1V3zm2 4h7v2H3V7zm2 2h4v2H5V9zm2 2h2v1H7v-1z" fill="#ff4757"/>
        </svg>
    </template>

    <script>
        // Конечная точка времени: 3 июня 2026, 09:50 UTC+3
        const targetTime = new Date("2026-06-03T09:50:00+03:00");
        // НАЧАЛЬНАЯ ТОЧКА ОТСЧЕТА: 2 июня 2026, 15:00 UTC+3
        const startTime = new Date("2026-06-02T15:00:00+03:00");
        const totalDuration = targetTime - startTime;

        const azat = document.getElementById('azat-wrapper');
        const fariza = document.getElementById('fariza-wrapper');
        const timerText = document.getElementById('timer-text');
        const timerScreen = document.getElementById('timer-screen');
        const victoryScreen = document.getElementById('victory-screen');
        const clickZone = document.getElementById('click-zone');
        const heartTemplate = document.getElementById('heart-element');

        function createPopHeart(catNode) {
            const rect = catNode.getBoundingClientRect();
            const zoneRect = clickZone.getBoundingClientRect();
            
            const heart = heartTemplate.content.cloneNode(true).querySelector('svg');
            
            // Центрируем вылет строго над головой котика
            const x = (rect.left - zoneRect.left) + (rect.width / 2) - 8;
            const y = (rect.top - zoneRect.top) - 10;
            
            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;
            
            clickZone.appendChild(heart);
            setTimeout(() => heart.remove(), 1000); // Исчезают в 2 раза медленнее
        }

        function updateFrame() {
            const now = new Date();
            const diff = targetTime - now;

            if (diff <= 0) {
                // Точка Б (Встреча): Ставим Фаризу вплотную к Азату (на расстоянии ширины котика + зазор)
                fariza.style.left = 'calc(10% + 55px + 4px)';
                
                azat.classList.remove('bounce-animation');
                fariza.classList.remove('bounce-animation');
                
                timerScreen.style.display = 'none';
                victoryScreen.style.display = 'block';
                
                clearInterval(loop);
                return;
            }

            // Рендер таймера
            const s = Math.floor((diff / 1000) % 60);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));

            const format = (n) => String(n).padStart(2, '0');
            timerText.innerText = `${format(d)}д : ${format(h)}ч : ${format(m)}м : ${format(s)}с`;

            // Математика сближения по вектору:
            // Точка А (старт): 80% (правый край)
            // Точка Б (встреча): 22% (прямо перед Азатом, который стоит на 10%)
            const startLeftPercent = 80;
            const endLeftPercent = 22;

            const passed = now - startTime;
            let ratio = passed / totalDuration;
            if (ratio < 0) ratio = 0;
            if (ratio > 1) ratio = 1;

            // Вычисляем текущую координату left для Фаризы
            const currentLeft = startLeftPercent - (ratio * (startLeftPercent - endLeftPercent));
            fariza.style.left = `${currentLeft}%`;
        }

        // Запуск основного цикла
        updateFrame();
        const loop = setInterval(updateFrame, 1000);

        // Клик/Тап анимация стикеров
        clickZone.addEventListener('click', () => {
            const now = new Date();
            if (targetTime - now > 0) {
                createPopHeart(azat);
                createPopHeart(fariza);
            }
        });
    </script>
</body>
</html>
