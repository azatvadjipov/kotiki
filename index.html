<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Встреча Азата и Фаризы 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sky-color: #5c94fc;
            --grass-color: #52b73a;
            --road-color: #9c6b30;
            --road-border: #6b471c;
            --text-color: #ffffff;
            --ui-bg: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background-color: var(--sky-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
            /* Убираем сглаживание для всего документа */
            image-rendering: pixelated; 
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            position: relative;
        }

        /* UI панель сверху */
        .status-box {
            background-color: var(--ui-bg);
            border: 4px solid #fff;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        h1 {
            color: var(--text-color);
            font-size: 1rem;
            line-height: 1.5;
            text-shadow: 2px 2px 0px #000;
        }

        /* Игровая сцена */
        .scene {
            width: 100%;
            height: 200px;
            background-color: var(--grass-color);
            border: 4px solid #fff;
            position: relative;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        /* Пиксельная дорога */
        .road {
            width: 100%;
            height: 80px;
            background-color: var(--road-color);
            border-top: 4px dashed var(--road-border);
            border-bottom: 4px dashed var(--road-border);
            position: absolute;
            bottom: 20px;
            display: flex;
            justify-content: center;
        }

        /* Центр (точка встречи) */
        .meeting-point {
            position: absolute;
            bottom: 30px;
            width: 4px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.3);
            border-left: 2px dotted #fff;
        }

        /* Обёртка для котика и имени */
        .cat-wrapper {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 1s linear, right 1s linear;
            z-index: 10;
        }

        .name-tag {
            font-size: 0.6rem;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 4px 6px;
            border-radius: 4px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 0px #000;
        }

        /* SVG Котики */
        .cat-svg {
            width: 64px;
            height: 64px;
            display: block;
        }

        #wrapper-azat {
            left: 0;
        }

        #wrapper-fariza {
            right: 0;
        }

        /* Разворачиваем только SVG Фаризы (чтобы имя не зеркалилось) */
        #wrapper-fariza .cat-svg {
            transform: scaleX(-1);
        }

        /* Цвета пикселей */
        .grey-cat { fill: #8c8c8c; }
        .white-cat { fill: #ffffff; }
        .eye { fill: #000000; }
        .nose { fill: #ff8fab; }
        .outline { fill: #333333; } /* Контур для белого котика, чтобы выделялся */

        /* Пиксельные сердечки шлейфа */
        .heart-trail {
            position: absolute;
            width: 16px;
            height: 16px;
            animation: floatUp 1.5s linear forwards;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-40px) scale(0.5);
            }
        }

        /* Экран праздника */
        #celebration {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ffb8b8;
            display: none;
            text-shadow: 2px 2px 0px #000;
            background-color: var(--ui-bg);
            border: 4px solid #fff;
            padding: 20px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: #ff4081; }
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            h1 { font-size: 0.8rem; }
            .cat-svg { width: 48px; height: 48px; }
            .road { height: 60px; bottom: 15px; }
            .cat-wrapper { bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-box" id="status-box">
            <h1 id="status-title">ПУТЬ К ВСТРЕЧЕ...</h1>
        </div>
        
        <div class="scene" id="scene">
            <div class="road"></div>
            <div class="meeting-point"></div>

            <div id="wrapper-azat" class="cat-wrapper">
                <div class="name-tag">Азат</div>
                <svg class="cat-svg" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="10" width="3" height="2" class="grey-cat"/>
                    <rect x="0" y="8" width="2" height="2" class="grey-cat"/>
                    <rect x="3" y="8" width="7" height="6" class="grey-cat"/>
                    <rect x="4" y="14" width="2" height="2" class="grey-cat"/>
                    <rect x="8" y="14" width="2" height="2" class="grey-cat"/>
                    <rect x="9" y="5" width="6" height="5" class="grey-cat"/>
                    <rect x="9" y="3" width="2" height="2" class="grey-cat"/>
                    <rect x="13" y="3" width="2" height="2" class="grey-cat"/>
                    <rect x="13" y="6" width="2" height="2" class="eye"/>
                    <rect x="15" y="8" width="1" height="1" class="nose"/>
                </svg>
            </div>

            <div id="wrapper-fariza" class="cat-wrapper">
                <div class="name-tag">Фариза</div>
                <svg class="cat-svg" viewBox="-1 -1 18 18" xmlns="http://www.w3.org/2000/svg">
                    <rect x="0" y="9" width="4" height="4" class="outline"/>
                    <rect x="-1" y="7" width="4" height="4" class="outline"/>
                    <rect x="2" y="7" width="9" height="8" class="outline"/>
                    <rect x="3" y="13" width="4" height="4" class="outline"/>
                    <rect x="7" y="13" width="4" height="4" class="outline"/>
                    <rect x="8" y="4" width="8" height="7" class="outline"/>
                    <rect x="8" y="2" width="4" height="4" class="outline"/>
                    <rect x="12" y="2" width="4" height="4" class="outline"/>

                    <rect x="1" y="10" width="3" height="2" class="white-cat"/>
                    <rect x="0" y="8" width="2" height="2" class="white-cat"/>
                    <rect x="3" y="8" width="7" height="6" class="white-cat"/>
                    <rect x="4" y="14" width="2" height="2" class="white-cat"/>
                    <rect x="8" y="14" width="2" height="2" class="white-cat"/>
                    <rect x="9" y="5" width="6" height="5" class="white-cat"/>
                    <rect x="9" y="3" width="2" height="2" class="white-cat"/>
                    <rect x="13" y="3" width="2" height="2" class="white-cat"/>
                    <rect x="13" y="6" width="2" height="2" class="eye"/>
                    <rect x="15" y="8" width="1" height="1" class="nose"/>
                </svg>
            </div>
        </div>

        <div id="celebration">
            УРАААА! <br><br>
            АЗАТ И ФАРИЗА ВСТРЕТИЛИСЬ! <br>💖💖💖
        </div>
    </div>

    <template id="heart-template">
        <svg viewBox="0 0 11 11" xmlns="http://www.w3.org/2000/svg" class="heart-trail">
            <rect x="2" y="1" width="2" height="2" fill="#ff4081"/>
            <rect x="7" y="1" width="2" height="2" fill="#ff4081"/>
            <rect x="1" y="3" width="9" height="4" fill="#ff4081"/>
            <rect x="3" y="7" width="5" height="2" fill="#ff4081"/>
            <rect x="5" y="9" width="1" height="2" fill="#ff4081"/>
        </svg>
    </template>

    <script>
        // Точное время встречи: 3 июня 2026, 09:50 (Часовой пояс +3)
        // Строгий формат ISO гарантирует правильный парсинг таймзоны в браузере
        const targetDate = new Date("2026-06-03T09:50:00+03:00"); 
        
        // Для демонстрации плавного старта берем момент загрузки страницы
        const loadTime = new Date();
        const totalDuration = targetDate - loadTime > 0 ? targetDate - loadTime : 60000;

        const azat = document.getElementById('wrapper-azat');
        const fariza = document.getElementById('wrapper-fariza');
        const celebration = document.getElementById('celebration');
        const statusBox = document.getElementById('status-box');
        const scene = document.getElementById('scene');
        const heartTemplate = document.getElementById('heart-template');

        // Функция спавна пиксельных сердечек сзади котиков
        function leaveHeartTrail(catElement, isRightSide) {
            const rect = catElement.getBoundingClientRect();
            const sceneRect = scene.getBoundingClientRect();
            
            // Клонируем SVG из шаблона
            const heart = heartTemplate.content.cloneNode(true).querySelector('svg');
            
            // Если кот идет слева направо (Азат), хвост слева. Если справа налево (Фариза) - хвост справа.
            const offsetX = isRightSide ? rect.width - 10 : 0;
            const x = rect.left - sceneRect.left + offsetX;
            const y = rect.top - sceneRect.top + (rect.height / 2) + 10;
            
            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;
            
            scene.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function updatePosition() {
            const now = new Date();
            const timeRemaining = targetDate - now;

            if (timeRemaining <= 0) {
                // Время истекло — котики встретились!
                // Центруем с учетом их собственной ширины (около 64px)
                azat.style.left = 'calc(50% - 40px)';
                fariza.style.right = 'calc(50% - 40px)';
                
                statusBox.style.display = 'none';
                celebration.style.display = 'block';
                
                clearInterval(positionInterval);
                clearInterval(trailInterval);
                return;
            }

            // Высчитываем прогресс в % (макс 40%, чтобы котики остановились нос к носу)
            const timePassed = totalDuration - timeRemaining;
            let progress = (timePassed / totalDuration) * 50;
            if (progress < 0) progress = 0;
            if (progress > 40) progress = 40; 

            azat.style.left = `${progress}%`;
            fariza.style.right = `${progress}%`;
        }

        // Запуск логики
        updatePosition();
        const positionInterval = setInterval(updatePosition, 1000);

        // Хвосты из сердечек (каждые 800мс)
        const trailInterval = setInterval(() => {
            const now = new Date();
            if (targetDate - now > 0) {
                leaveHeartTrail(azat, false); // Азат (идет слева направо)
                leaveHeartTrail(fariza, true); // Фариза (идет справа налево)
            }
        }, 800);
    </script>
</body>
</html>
