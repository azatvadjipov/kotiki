<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Азат & Фариза: Путь в Стамбул 🇹🇷✈️</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sky-gradient: linear-gradient(to bottom, #7ddcfd 0%, #a2e8ff 100%);
            --grass-color: #52b73a;
            --road-color: #9c6b30;
            --road-border: #6b471c;
            --text-color: #ffffff;
            --ui-bg: rgba(0, 0, 0, 0.6);
            --border-color: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: linear-gradient(to bottom, #ffeef2, #ffebf2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
            /* Пикселизация всего */
            image-rendering: pixelated; 
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
            position: relative;
        }

        /* UI панель таймера */
        .status-box {
            background-color: var(--ui-bg);
            border: 4px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        h1 {
            color: var(--text-color);
            font-size: 0.9rem;
            line-height: 1.5;
            text-shadow: 2px 2px 0px #000;
        }

        .countdown {
            color: #ff6a6a;
            font-size: 1.1rem;
            margin-top: 5px;
            text-shadow: 1px 1px 0px #000;
        }

        /* Игровая сцена */
        .scene {
            width: 100%;
            height: 300px;
            background: var(--sky-gradient);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            position: relative;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            cursor: pointer;
        }

        /* Небо: Солнце и облака */
        .sun {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 32px;
            height: 32px;
            background: #f1c40f;
            border-radius: 4px;
            animation: sunPulse 3s linear infinite alternate;
        }
        .sun-ray {
            position: absolute;
            width: 10px; height: 4px; background: #f1c40f; border-radius: 2px;
        }
        .sun-ray.v1 { top: -6px; left: 11px; transform: rotate(90deg); }
        .sun-ray.v2 { bottom: -6px; left: 11px; transform: rotate(90deg); }
        .sun-ray.h1 { top: 14px; left: -6px; }
        .sun-ray.h2 { top: 14px; right: -6px; }
        .sun-ray.d1 { top: 0px; left: -2px; transform: rotate(45deg); }
        .sun-ray.d2 { top: 0px; right: -2px; transform: rotate(-45deg); }
        .sun-ray.d3 { bottom: 0px; left: -2px; transform: rotate(-45deg); }
        .sun-ray.d4 { bottom: 0px; right: -2px; transform: rotate(45deg); }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 4px;
            opacity: 0.8;
            animation: floatCloud 20s linear infinite alternate;
        }
        .cloud-1 { width: 50px; height: 15px; top: 40px; }
        .cloud-2 { width: 80px; height: 20px; top: 70px; left: 30%; animation-duration: 30s; }
        .cloud-3 { width: 40px; height: 10px; top: 25px; left: 60%; animation-duration: 25s; }

        @keyframes sunPulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes floatCloud { 0% { transform: translateX(0); } 100% { transform: translateX(20px); } }

        /* Стамбул (у Азата) */
        .istanbul {
            position: absolute;
            bottom: 60px;
            left: 10px;
            width: 180px;
            height: 80px;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Знак ¡STANBUL */
        .istanbul-sign {
            background-color: #fff;
            border: 4px solid var(--border-color);
            padding: 8px 12px;
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }
        .istanbul-sign h2 { font-size: 0.6rem; color: #000; margin-bottom: 2px; }
        .istanbul-sign .flag { font-size: 0.8rem; }

        /* Дорога */
        .road {
            width: 100%;
            height: 60px;
            background-color: var(--road-color);
            border-top: 4px dashed var(--road-border);
            border-bottom: 4px dashed var(--road-border);
            position: absolute;
            bottom: 0px;
        }

        /* Трава */
        .grass {
            width: 100%;
            height: 10px;
            background-color: var(--grass-color);
            position: absolute;
            bottom: 60px;
        }

        /* Котики (Обертка) */
        .cat-wrapper {
            position: absolute;
            bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* АЗАТ (Серый, стоит в Стамбуле) */
        #azat-wrapper {
            left: 0%;
        }

        /* ФАРИЗА (Белая, летит к нему) */
        #fariza-wrapper {
            right: 0%;
        }

        .name-tag {
            font-size: 0.6rem;
            color: #fff;
            background-color: var(--ui-bg);
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            box-shadow: 1px 1px 0px #000;
        }

        /* Котики СВГ */
        .cat-svg {
            width: 60px;
            height: 60px;
            display: block;
        }

        /* Азат стоит */
        .grey-cat { fill: #8e8e93; }
        .white-cat { fill: #ffffff; }
        .eye { fill: #000000; }
        .eye-shine { fill: #fff; }
        .nose { fill: #ffb8b8; }

        /* Фариза: поза "полета/парения", зеркалирование */
        #fariza-wrapper .cat-svg {
            transform: scaleX(-1);
            animation: farizaFloat 0.6s ease-in-out infinite alternate;
        }
        @keyframes farizaFloat {
            0% { transform: scaleX(-1) translateY(0); }
            100% { transform: scaleX(-1) translateY(-4px); }
        }

        /* Увеличенный Чемодан */
        .suitcase {
            width: 20px;
            height: 20px;
            position: absolute;
            bottom: -5px;
            right: -25px;
        }

        /* Сердечки шлейфа */
        .heart-trail {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: floatUp 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(0.6); } }

        /* Интерактивные сердечки (при клике) */
        .interactive-heart {
            position: absolute;
            width: 20px;
            height: 20px;
            animation: heartMeet 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
            z-index: 20;
        }
        @keyframes heartMeet { 0% { transform: scale(0.2); opacity: 0; } 50% { transform: scale(1.2) translateY(-10px); opacity: 1; } 100% { transform: scale(0.8) translateY(-15px) translateX(var(--meet-x)); opacity: 0; } }

        /* Результат */
        #celebration {
            margin-top: 20px;
            background-color: var(--ui-bg);
            border: 4px solid var(--border-color);
            padding: 15px;
            font-size: 1.2rem;
            color: #ffb8b8;
            display: none;
            animation: popIn 0.5s ease-out forwards;
            text-shadow: 2px 2px 0px #000;
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* Адаптивность для мобильных */
        @media (max-width: 500px) {
            h1 { font-size: 0.65rem; }
            .countdown { font-size: 0.8rem; }
            .scene { height: 260px; }
            .cat-svg { width: 50px; height: 50px; }
            .road { height: 50px; }
            .grass { bottom: 50px; }
            .cat-wrapper { bottom: 20px; }
            .istanbul-sign h2 { font-size: 0.5rem; }
            .istanbul { width: 130px; height: 60px; left: 5px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-box" id="timer-box">
            <h1>АЗАТ ОЖИДАЕТ В ТУРЦИИ...<br>ФАРИЗА ЛЕТИТ К НЕМУ! 🇹🇷❤️</h1>
            <div class="countdown" id="countdown-text">00д : 16ч : 48м : 54с</div>
        </div>
        
        <div class="scene" id="game-scene">
            <div class="sun">
                <div class="sun-ray v1"></div><div class="sun-ray v2"></div>
                <div class="sun-ray h1"></div><div class="sun-ray h2"></div>
                <div class="sun-ray d1"></div><div class="sun-ray d2"></div>
                <div class="sun-ray d3"></div><div class="sun-ray d4"></div>
            </div>
            <div class="cloud cloud-1"></div><div class="cloud cloud-2"></div><div class="cloud cloud-3"></div>

            <svg class="istanbul" viewBox="0 0 180 80" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="20" width="20" height="60" fill="#a0a0a0"/>
                <rect x="8" y="15" width="24" height="5" fill="#a0a0a0"/>
                <polygon points="10,15 20,0 30,15" fill="#707070"/>
                <circle cx="90" cy="50" r="30" fill="#a0a0a0"/>
                <rect x="60" y="50" width="60" height="30" fill="#a0a0a0"/>
                <rect x="55" y="0" width="4" height="80" fill="#a0a0a0"/>
                <rect x="121" y="0" width="4" height="80" fill="#a0a0a0"/>
            </svg>

            <div class="istanbul-sign">
                <h2>¡STANBUL</h2>
                <div class="flag">🇹🇷</div>
            </div>

            <div class="grass"></div>
            <div class="road"></div>

            <div id="azat-wrapper" class="cat-wrapper">
                <div class="name-tag">Азат🇹🇷</div>
                <svg class="cat-svg" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="0" width="3" height="3" class="grey-cat"/>
                    <rect x="10" y="0" width="3" height="3" class="grey-cat"/>
                    <rect x="4" y="1" width="1" height="1" class="nose"/>
                    <rect x="11" y="1" width="1" height="1" class="nose"/>
                    <rect x="2" y="3" width="12" height="10" class="grey-cat"/>
                    <rect x="4" y="5" width="3" height="4" class="eye"/>
                    <rect x="5" y="5" width="1" height="1" class="eye-shine"/>
                    <rect x="9" y="5" width="3" height="4" class="eye"/>
                    <rect x="10" y="5" width="1" height="1" class="eye-shine"/>
                    <rect x="7" y="9" width="2" height="1" class="nose"/>
                    <rect x="4" y="13" width="3" height="3" class="grey-cat"/>
                    <rect x="9" y="13" width="3" height="3" class="grey-cat"/>
                    <rect x="0" y="8" width="2" height="4" class="grey-cat"/>
                </svg>
            </div>

            <div id="fariza-wrapper" class="cat-wrapper">
                <div class="name-tag">Фариза✈️</div>
                <div style="position: relative;">
                    <svg class="cat-svg" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="0" width="3" height="3" class="white-cat"/>
                        <rect x="10" y="0" width="3" height="3" class="white-cat"/>
                        <rect x="4" y="1" width="1" height="1" class="nose"/>
                        <rect x="11" y="1" width="1" height="1" class="nose"/>
                        <rect x="2" y="3" width="12" height="10" class="white-cat"/>
                        <rect x="4" y="5" width="3" height="4" class="eye"/>
                        <rect x="5" y="5" width="1" height="1" class="eye-shine"/>
                        <rect x="9" y="5" width="3" height="4" class="eye"/>
                        <rect x="10" y="5" width="1" height="1" class="eye-shine"/>
                        <rect x="7" y="9" width="2" height="1" class="nose"/>
                        <rect x="4" y="13" width="3" height="3" class="white-cat"/>
                        <rect x="9" y="13" width="3" height="3" class="white-cat"/>
                        <rect x="0" y="8" width="2" height="4" class="white-cat"/>
                    </svg>
                    <svg class="suitcase" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="4" width="12" height="11" fill="#ff7675" rx="1"/>
                        <rect x="3" y="5" width="10" height="9" fill="#ff4757" rx="1"/>
                        <rect x="5" y="0" width="6" height="4" fill="#333"/>
                        <rect x="6" y="1" width="4" height="2" fill="#fff"/>
                        <rect x="4" y="15" width="2" height="1" fill="#333"/>
                        <rect x="10" y="15" width="2" height="1" fill="#333"/>
                    </svg>
                </div>
            </div>
        </div>

        <div id="celebration">
            УРАААА! <br><br>
            АЗАТ И ФАРИЗА ВСТРЕТИЛИСЬ!<br>💖💖💖
        </div>
    </div>

    <template id="pixel-heart-template">
        <svg viewBox="0 0 11 11" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 1h2v2H3V1zm4 0h2v2H7V1zM1 3h9v4H1V3zm2 4h7v2H3V7zm2 2h4v2H5V9zm2 2h2v1H7v-1z" fill="#ff4757"/>
        </svg>
    </template>

    <script>
        // Конечная дата: 3 июня 2026, 09:50 (Часовой пояс UTC+3)
        const targetDate = new Date("2026-06-03T09:50:00+03:00");
        
        // Начало отсчета (для сближения) — за 2 дня до встречи (зашито)
        const startDate = new Date("2026-06-01T00:00:00+03:00");
        const totalTimeline = targetDate - startDate;

        const azat = document.getElementById('azat-wrapper');
        const fariza = document.getElementById('fariza-wrapper');
        const countdownText = document.getElementById('countdown-text');
        const timerBox = document.getElementById('timer-box');
        const celebration = document.getElementById('celebration');
        const scene = document.getElementById('game-scene');
        const heartTemplate = document.getElementById('pixel-heart-template');

        // Спавн пиксельных сердечек шлейфа
        function leaveHeartTrail(catElement, isReverse = false) {
            const rect = catElement.getBoundingClientRect();
            const sceneRect = scene.getBoundingClientRect();
            
            const heart = heartTemplate.content.cloneNode(true).querySelector('svg');
            heart.className = 'heart-trail';
            
            const offsetX = isReverse ? rect.width - 15 : 0;
            const x = rect.left - sceneRect.left + offsetX;
            const y = rect.top - sceneRect.top + (rect.height / 2) + 10;
            
            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;
            
            scene.appendChild(heart);
            setTimeout(() => heart.remove(), 1200);
        }

        // Спавн интерактивного сердечка (при клике)
        function spawnInteractiveHeart(startX, meetX) {
            const heart = heartTemplate.content.cloneNode(true).querySelector('svg');
            heart.className = 'interactive-heart';
            heart.style.left = startX;
            heart.style.setProperty('--meet-x', meetX); // CSS переменная для направления
            
            scene.appendChild(heart);
            setTimeout(() => heart.remove(), 400); // Быстро исчезают
        }

        function updateGame() {
            const now = new Date();
            const timeRemaining = targetDate - now;

            if (timeRemaining <= 0) {
                // Встреча!
                azat.style.left = 'calc(50% - 40px)';
                fariza.style.right = 'calc(50% - 40px)';
                
                timerBox.style.display = 'none';
                celebration.style.display = 'block';
                
                clearInterval(gameInterval);
                clearInterval(trailInterval);
                return;
            }

            // Таймер обратного отсчета
            const seconds = Math.floor((timeRemaining / 1000) % 60);
            const minutes = Math.floor((timeRemaining / 1000 / 60) % 60);
            const hours = Math.floor((timeRemaining / (1000 * 60 * 60)) % 24);
            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));

            const pad = (num) => String(num).padStart(2, '0');
            countdownText.innerText = `${pad(days)}д : ${pad(hours)}ч : ${pad(minutes)}м : ${pad(seconds)}с`;

            // Позиционирование котиков на основе прогресса (%)
            const currentPassed = now - startDate;
            let progress = (currentPassed / totalTimeline) * 50; 
            
            if (progress < 0) progress = 0;
            if (progress > 43) progress = 43; 

            azat.style.left = `${progress}%`;
            fariza.style.right = `${progress}%`;
        }

        // Инициализация циклов
        updateGame();
        const gameInterval = setInterval(updateGame, 1000);

        // Хвосты сердечек (каждые 800мс)
        const trailInterval = setInterval(() => {
            const now = new Date();
            if (targetDate - now > 0) {
                leaveHeartTrail(azat, false);
                leaveHeartTrail(fariza, true); // Хвост сзади чемодана
            }
        }, 800);

        // Интерактивность при клике (тапе) по сцене
        scene.addEventListener('click', (e) => {
            const now = new Date();
            if (targetDate - now > 0) {
                // Спавн двух сердечек, летящих навстречу
                spawnInteractiveHeart(azat.style.left, '100px'); // От Азата вправо
                spawnInteractiveHeart(fariza.style.right, '-100px'); // От Фаризы влево
            }
        });
    </script>
</body>
</html>
