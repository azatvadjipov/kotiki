<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Азат & Фариза: Встреча в Турции ✈️🇹🇷</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sky-top: #74b9ff;
            --sky-bottom: #a29bfe;
            --grass: #2ecc71;
            --road: #e67e22;
            --road-dark: #d35400;
            --ui-border: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
            image-rendering: pixelated;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        /* Пиксельное табло сверху */
        .ui-panel {
            background-color: #fff;
            border: 6px solid var(--ui-border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        .ui-panel h1 {
            font-size: 0.9rem;
            color: #2c3e50;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .countdown {
            font-size: 1.1rem;
            color: #e74c3c;
            text-shadow: 1px 1px 0px #ffbd9b;
        }

        /* Игровой экран */
        .game-screen {
            width: 100%;
            height: 320px;
            background: linear-gradient(to bottom, #81ecec 0%, #74b9ff 70%, var(--grass) 70%);
            border: 6px solid var(--ui-border);
            border-radius: 16px;
            position: relative;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Задний план: Стамбул (Галатская башня и мост) */
        .istanbul-skyline {
            position: absolute;
            left: 30px;
            bottom: 30%;
            width: 250px;
            height: 120px;
            opacity: 0.35;
            pointer-events: none;
        }

        /* Облака */
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 4px;
            opacity: 0.8;
            animation: floatCloud 25s linear infinite;
        }
        .cloud-1 { width: 80px; height: 20px; top: 30px; animation-duration: 35s; }
        .cloud-2 { width: 120px; height: 25px; top: 70px; animation-duration: 45s; left: 30%; }

        @keyframes floatCloud {
            0% { transform: translateX(900px); }
            100% { transform: translateX(-200px); }
        }

        /* Самолет Фаризы в небе */
        .plane-wrapper {
            position: absolute;
            right: 50px;
            top: 40px;
            display: flex;
            align-items: center;
            animation: bobbing 3s ease-in-out infinite;
        }

        .plane-trail {
            font-size: 0.6rem;
            color: #fff;
            margin-right: 8px;
            letter-spacing: 2px;
        }

        /* Дорога */
        .pixel-road {
            width: 100%;
            height: 70px;
            background-color: var(--road);
            border-top: 6px dashed var(--road-dark);
            border-bottom: 6px dashed var(--road-dark);
            position: absolute;
            bottom: 15px;
        }

        /* Декорации на дороге */
        .signpost {
            position: absolute;
            left: 40px;
            bottom: 85px;
            background: #fff;
            border: 4px solid var(--ui-border);
            padding: 6px;
            font-size: 0.5rem;
            color: #000;
            text-align: center;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        /* Персонажи (обертка) */
        .char-container {
            position: absolute;
            bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        #azat-wrapper { left: 0%; }
        #fariza-wrapper { right: 0%; }

        .name-tag {
            font-size: 0.55rem;
            color: #fff;
            background-color: var(--ui-border);
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            white-space: nowrap;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        /* Анимация ходьбы */
        .walking-animation {
            animation: walkCycle 0.5s steps(2) infinite;
        }

        @keyframes walkCycle {
            0% { transform: translateY(0); }
            50% { transform: translateY(-3px) rotate(1deg); }
        }

        /* Стили для СВГ спрайтов */
        .cat-sprite {
            width: 70px;
            height: 70px;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.15));
        }

        /* Поворот Фаризы налево */
        #fariza-wrapper .cat-sprite {
            transform: scaleX(-1);
        }

        /* Чемодан Фаризы */
        .suitcase {
            width: 28px;
            height: 28px;
            position: absolute;
            bottom: 0;
            right: -22px; /* Катится позади неё */
            animation: suitcaseBob 0.5s steps(2) infinite;
        }

        @keyframes suitcaseBob {
            50% { transform: translateY(-2px); }
        }

        /* Пиксельные сердечки шлейфа */
        .pixel-heart {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: heartFloatUp 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 9;
        }

        @keyframes heartFloatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.6); }
        }

        /* Победный экран */
        .victory-screen {
            display: none;
            background-color: #fff;
            border: 6px solid #ff4757;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            animation: victoryPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes victoryPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .victory-screen h2 {
            font-size: 1.2rem;
            color: #ff4757;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .victory-screen p {
            font-size: 0.75rem;
            color: #2c3e50;
            line-height: 1.8;
        }

        /* Анимация радостных прыжков при встрече */
        .happy-jump {
            animation: happyBounce 0.4s ease-in-out infinite alternate !important;
        }

        @keyframes happyBounce {
            0% { transform: translateY(0) scaleY(1); }
            100% { transform: translateY(-20px) scaleY(0.95); }
        }

        @keyframes bobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Адаптивность для мобильных телефонов */
        @media (max-width: 600px) {
            .ui-panel h1 { font-size: 0.65rem; }
            .countdown { font-size: 0.8rem; }
            .game-screen { height: 260px; }
            .cat-sprite { width: 52px; height: 52px; }
            .suitcase { width: 22px; height: 22px; right: -16px; }
            .name-tag { font-size: 0.45rem; padding: 3px 5px; }
            .victory-screen h2 { font-size: 0.9rem; }
            .victory-screen p { font-size: 0.6rem; }
            .signpost { left: 15px; font-size: 0.4rem; }
            .istanbul-skyline { width: 160px; left: 10px; opacity: 0.25; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="ui-panel" id="timer-panel">
            <h1 id="panel-title">АЗАТ ОЖИДАЕТ В ТУРЦИИ, ФАРИЗА УЖЕ ЛЕТИТ... ✈️</h1>
            <div class="countdown" id="countdown-text">00:00:00:00</div>
        </div>

        <div class="game-screen" id="viewport">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>

            <div class="plane-wrapper" id="sky-plane">
                <span class="plane-trail">💗 💗 💗</span>
                <svg width="32" height="24" viewBox="0 0 32 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4h4v4h-4V4zm4 4h12v4H16V8zm-8 4h24v4H4v-4zm0 4h12v4H8v-4z" fill="#fff"/>
                    <path d="M12 20h4v4h-4v-4z" fill="#ff4757"/>
                </svg>
            </div>

            <svg class="istanbul-skyline" viewBox="0 0 200 100" fill="#2980b9" xmlns="http://www.w3.org/2000/svg">
                <rect x="30" y="40" width="25" height="60"/>
                <rect x="27" y="36" width="31" height="4"/>
                <rect x="33" y="20" width="19" height="16"/>
                <polygon points="33,20 42.5,0 52,20"/>
                <rect x="90" y="75" width="4" height="25"/>
                <rect x="170" y="75" width="4" height="25"/>
                <path d="M90 78 Q 130 90 170 78" stroke="#2980b9" stroke-width="3" fill="none"/>
                <line x1="90" y1="78" x2="170" y2="78" stroke="#2980b9" stroke-width="2"/>
            </svg>

            <div class="signpost">İSTANBUL<br>🇹🇷</div>

            <div class="pixel-road"></div>

            <div id="azat-wrapper" class="char-container walking-animation">
                <div class="name-tag">Азат 🇹🇷</div>
                <svg class="cat-sprite" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 16h4v2H2zM4 12h2v4H4zm2-4h2v4H6z" fill="#7f8c8d"/>
                    <rect x="8" y="14" width="14" height="12" fill="#95a5a6"/>
                    <rect x="10" y="16" width="10" height="10" fill="#7f8c8d"/>
                    <rect x="10" y="26" width="3" height="3" fill="#636e72"/>
                    <rect x="17" y="26" width="3" height="3" fill="#636e72"/>
                    <rect x="16" y="6" width="12" height="11" fill="#95a5a6"/>
                    <rect x="17" y="7" width="10" height="9" fill="#7f8c8d"/>
                    <rect x="17" y="3" width="3" height="3" fill="#7f8c8d"/>
                    <rect x="24" y="3" width="3" height="3" fill="#7f8c8d"/>
                    <rect x="23" y="8" width="3" height="4" fill="#2d3436"/>
                    <rect x="23" y="8" width="1" height="2" fill="#ffffff"/> <rect x="27" y="11" width="2" height="1" fill="#ff7675"/>
                    <rect x="21" y="11" width="2" height="2" fill="#fab1a0" opacity="0.8"/>
                </svg>
            </div>

            <div id="fariza-wrapper" class="char-container walking-animation">
                <div class="name-tag">Фариза ✈️</div>
                <div style="position: relative;">
                    <svg class="cat-sprite" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 16h4v2H2zM4 12h2v4H4zm2-4h2v4H6z" fill="#dcdde1"/>
                        <rect x="8" y="14" width="14" height="12" fill="#ffffff"/>
                        <rect x="10" y="16" width="10" height="10" fill="#f5f6fa"/>
                        <rect x="10" y="26" width="3" height="3" fill="#b2bec3"/>
                        <rect x="17" y="26" width="3" height="3" fill="#b2bec3"/>
                        <rect x="16" y="6" width="12" height="11" fill="#ffffff"/>
                        <rect x="17" y="7" width="10" height="9" fill="#f5f6fa"/>
                        <rect x="17" y="3" width="3" height="3" fill="#ffffff"/>
                        <rect x="24" y="3" width="3" height="3" fill="#ffffff"/>
                        <rect x="18" y="5" width="1" height="1" fill="#ff7675"/> <rect x="23" y="8" width="3" height="4" fill="#222f3e"/>
                        <rect x="23" y="8" width="1" height="2" fill="#ffffff"/> 
                        <rect x="27" y="11" width="2" height="1" fill="#ff7675"/>
                        <rect x="21" y="11" width="2" height="2" fill="#ffb8b8"/>
                    </svg>
                    
                    <svg class="suitcase" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="5" width="10" height="9" fill="#ff6b81" rx="1"/>
                        <rect x="4" y="6" width="8" height="7" fill="#ff4757" rx="1"/>
                        <rect x="6" y="1" width="4" height="4" fill="#57606f"/>
                        <rect x="7" y="2" width="2" height="3" fill="#e1b12c"/>
                        <circle cx="5" cy="15" r="1" fill="#2f3542"/>
                        <circle cx="11" cy="15" r="1" fill="#2f3542"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="victory-screen" id="victory-panel">
            <h2>💖 УРАААА! КОТИКИ ВСТРЕТИЛИСЬ! 💖</h2>
            <p>Азат и Фариза наконец-то вместе в Турции! <br> Путешествие окончено, впереди только счастье! ✨🇹🇷🐾</p>
        </div>
    </div>

    <template id="pixel-heart-template">
        <svg class="pixel-heart" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 1h2v2H3V1zm4 0h2v2H7V1zM1 3h10v4H1V3zm2 4h8v2H3V7zm2 2h4v2H5V9zm2 2h2v1H7v-1z" fill="#ff4757"/>
        </svg>
    </template>

    <script>
        // Конечная дата: 3 июня 2026 года в 09:50:00 (Часовой пояс UTC+3)
        const targetDate = new Date("2026-06-03T09:50:00+03:00");
        
        // Начало отсчета для ровного и плавного движения (зафиксировано на 2 июня 2026)
        const startDate = new Date("2026-06-02T00:00:00+03:00");
        
        const totalTimeline = targetDate - startDate;

        const azat = document.getElementById('azat-wrapper');
        const fariza = document.getElementById('fariza-wrapper');
        const countdownText = document.getElementById('countdown-text');
        const timerPanel = document.getElementById('timer-panel');
        const victoryPanel = document.getElementById('victory-panel');
        const viewport = document.getElementById('viewport');
        const skyPlane = document.getElementById('sky-plane');
        const heartTemplate = document.getElementById('pixel-heart-template');

        // Спавн пиксельных сердечек из хвоста
        function spawnTrailHeart(element, isFariza = false) {
            const rect = element.getBoundingClientRect();
            const viewRect = viewport.getBoundingClientRect();
            
            const heart = heartTemplate.content.cloneNode(true).querySelector('svg');
            
            // Смещение хвоста: у Азата слева, у Фаризы справа (возле чемодана)
            const offsetX = isFariza ? rect.width + 10 : -10;
            const x = rect.left - viewRect.left + offsetX + (Math.random() * 8 - 4);
            const y = rect.top - viewRect.top + (rect.height / 2) + 15;
            
            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;
            
            viewport.appendChild(heart);
            setTimeout(() => heart.remove(), 1200);
        }

        // Праздничный салют из сердечек при встрече
        function spawnVictoryExplosion() {
            setInterval(() => {
                const heart = heartTemplate.content.cloneNode(true).querySelector('svg');
                heart.style.left = Math.random() * 95 + '%';
                heart.style.top = Math.random() * 70 + '%';
                heart.style.transform = `scale(${(Math.random() * 0.8 + 0.6)})`;
                heart.style.animation = 'heartFloatUp 1.5s step-end infinite';
                viewport.appendChild(heart);
                setTimeout(() => heart.remove(), 1500);
            }, 150);
        }

        function updateGame() {
            const now = new Date();
            const timeRemaining = targetDate - now;

            if (timeRemaining <= 0) {
                // Встреча состоялась!
                // Центрируем котиков идеально нос к носу
                azat.style.left = 'calc(50% - 55px)';
                fariza.style.right = 'calc(50% - 55px)';
                
                // Включаем анимацию радости вместо ходьбы
                azat.className = "char-container happy-jump";
                fariza.className = "char-container happy-jump";
                
                // Прячем самолет, так как Фариза прилетела
                skyPlane.style.display = 'none';
                
                // Переключаем интерфейс на победный
                timerPanel.style.display = 'none';
                victoryPanel.style.display = 'block';
                
                clearInterval(gameInterval);
                clearInterval(trailInterval);
                spawnVictoryExplosion();
                return;
            }

            // Форматирование таймера обратного отсчета
            const seconds = Math.floor((timeRemaining / 1000) % 60);
            const minutes = Math.floor((timeRemaining / 1000 / 60) % 60);
            const hours = Math.floor((timeRemaining / (1000 * 60 * 60)) % 24);
            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));

            const pad = (num) => String(num).padStart(2, '0');
            countdownText.innerText = `${pad(days)}д : ${pad(hours)}ч : ${pad(minutes)}м : ${pad(seconds)}с`;

            // Расчет позиции на основе реального времени (%)
            const currentPassed = now - startDate;
            let progress = (currentPassed / totalTimeline) * 50; 
            
            // Ограничиваем рамки, чтобы они не столкнулись раньше времени
            if (progress < 0) progress = 0;
            if (progress > 43) progress = 43; 

            azat.style.left = `${progress}%`;
            fariza.style.right = `${progress}%`;
        }

        // Инициализация циклов
        updateGame();
        const gameInterval = setInterval(updateGame, 1000);

        // Генерация шлейфа сердечек
        const trailInterval = setInterval(() => {
            const now = new Date();
            if (targetDate - now > 0) {
                spawnTrailHeart(azat, false);
                spawnTrailHeart(fariza, true);
            }
        }, 600);
    </script>
</body>
</html>
